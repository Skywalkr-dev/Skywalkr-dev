<svg width="800" viewBox="0 0 800 692" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Skywalkr-dev's terminal profile</title>
<desc>tmux-style terminal showing Naveen Bharath's GitHub profile</desc>

<defs>
  <clipPath id="clip-left"><rect x="0" y="238" width="398" height="184"/></clipPath>
  <clipPath id="clip-right"><rect x="402" y="238" width="398" height="184"/></clipPath>
</defs>

<style>
  .bg { fill: #1e1e2e; }
  .pane-div { stroke: #45475a; stroke-width: 1; }
  .status { fill: #313244; }
  .mono { font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 12.5px; }
  .prompt { fill: #89b4fa; }
  .arrow { fill: #f38ba8; }
  .cmd { fill: #cdd6f4; }
  .out { fill: #a6e3a1; }
  .st-text { font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 11px; }
  .st-fg { fill: #1e1e2e; }
  .st-fg2 { fill: #cdd6f4; }
</style>

<rect width="800" height="692" class="bg" rx="8"/>

<!-- top status bar -->
<rect x="0" y="0" width="800" height="22" class="status"/>
<rect x="0" y="0" width="8" height="22" class="bg"/>
<rect x="792" y="0" width="8" height="22" class="bg"/>
<rect x="8" y="0" width="120" height="22" fill="#89b4fa"/>
<text x="18" y="15" class="st-text st-fg" font-weight="600">0:bash</text>
<text x="132" y="15" class="st-text" fill="#6c7086">1:nvim  2:htop</text>
<text x="750" y="15" class="st-text st-fg2" text-anchor="end">Skywalkr-dev@github</text>

<!-- TOP PANE -->
